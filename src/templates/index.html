<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Character Creator</title>
    <link rel="stylesheet" href="/static/css/style.css?v=20260498" />
    <link rel="stylesheet" href="/static/css/character-sheet.css?v=20260491" />
    <!-- Unregister stray service workers on local dev hosts; they can intercept /api/bundle so uvicorn never logs it. -->
    <script>
      (function () {
        if (!("serviceWorker" in navigator)) return;
        var h = location.hostname;
        if (h !== "127.0.0.1" && h !== "localhost") return;
        navigator.serviceWorker
          .getRegistrations()
          .then(function (regs) {
            return Promise.all(
              regs.map(function (r) {
                return r.unregister();
              }),
            );
          })
          .catch(function () {});
      })();
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <div class="brand-lockup">
          <img
            class="brand-logo"
            src="/static/images/Scion%20Logo.png?v=1"
            alt=""
            decoding="async"
          />
          <h1 class="brand-title">Character Creator</h1>
        </div>
      </div>
    </header>

    <nav class="app-main-tabs" id="app-main-tabs" aria-label="Application mode"></nav>

    <nav class="wizard-nav" id="wizard-nav"></nav>

    <main id="wizard-root" class="wizard-root">
      <div id="wizard-line-toolbar" class="wizard-line-toolbar">
        <div
          id="header-tier-display"
          class="header-tier-display"
          title="New characters start at Origin (Mortal). Use Review → Advance to next tier after Visitation."
        ></div>
        <div class="wizard-json-actions">
          <input type="file" id="input-import-json" accept=".json,application/json" hidden aria-hidden="true" />
          <button type="button" id="btn-import-json" class="btn secondary">Import JSON</button>
          <button type="button" id="btn-export-json" class="btn secondary">Export JSON</button>
        </div>
      </div>
      <div id="wizard-step-host" class="wizard-step-host">
        <p class="wizard-loading-msg">Loading wizard…</p>
      </div>
    </main>

    <footer class="site-footer">
      <span>Rules text lives in your books—this tool stores summaries and citations only.</span>
    </footer>

    {% if bundle_b64 %}
    <textarea id="scion-embedded-bundle-b64" hidden aria-hidden="true" readonly>{{ bundle_b64 | safe }}</textarea>
    <script>
      window.__SCION_EMBEDDED_BUNDLE = true;
    </script>
    {% endif %}
    <script type="module" src="/static/js/app.js?v=20260499"></script>
  </body>
</html>
